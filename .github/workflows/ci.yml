name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - run: composer install --no-interaction
      - run: composer cs

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - run: composer install --no-interaction
      - run: composer analyse

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: npm run build
        working-directory: docs

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: composer test:unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: queuety_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: composer test:integration
        env:
          QUEUETY_TEST_DB_HOST: 127.0.0.1
          QUEUETY_TEST_DB_NAME: queuety_test
          QUEUETY_TEST_DB_USER: root
          QUEUETY_TEST_DB_PASS: root
          QUEUETY_TEST_DB_PREFIX: test_

  test-e2e-core:
    name: Core E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: queuety_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: bash tests/e2e/run-core.sh
        env:
          QUEUETY_TEST_DB_HOST: 127.0.0.1
          QUEUETY_TEST_DB_NAME: queuety_test
          QUEUETY_TEST_DB_USER: root
          QUEUETY_TEST_DB_PASS: root
          QUEUETY_TEST_DB_PREFIX: test_

  test-e2e-wordpress:
    name: WordPress Runtime E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: bash tests/e2e/install-node-deps.sh
      - run: bash tests/e2e/test-wp-env.sh
