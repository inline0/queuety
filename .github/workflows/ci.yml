name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - run: composer install --no-interaction
      - run: composer cs

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: composer test:unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: queuety_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, pdo_mysql
          tools: composer
      - run: composer install --no-interaction
      - run: composer test:integration
        env:
          QUEUETY_TEST_DB_HOST: 127.0.0.1
          QUEUETY_TEST_DB_NAME: queuety_test
          QUEUETY_TEST_DB_USER: root
          QUEUETY_TEST_DB_PASS: root
          QUEUETY_TEST_DB_PREFIX: test_
